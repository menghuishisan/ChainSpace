services:
  postgres:
    image: postgres:15-alpine
    container_name: chainspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-chainspace}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-chainspace}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chainspace} -d ${DB_NAME:-chainspace}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chainspace-network

  redis:
    image: redis:7-alpine
    container_name: chainspace-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chainspace-network

  minio:
    image: minio/minio:latest
    container_name: chainspace-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - chainspace-network

  minio-init:
    image: minio/mc:latest
    container_name: chainspace-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ./init-scripts/minio:/seed:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
      mc mb -p local/chainspace || true &&
      mc cp --recursive /seed/chainspace/challenges/0/attachments local/chainspace/challenges/0 &&
      mc cp --recursive /seed/chainspace/experiments/assets local/chainspace/experiments
      "
    networks:
      - chainspace-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: chainspace-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-chainspace}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - chainspace-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: chainspace-backend
    restart: unless-stopped
    environment:
      CHAINSPACE_SERVER_PORT: 3000
      CHAINSPACE_SERVER_MODE: release
      CHAINSPACE_DB_HOST: postgres
      CHAINSPACE_DB_PORT: 5432
      CHAINSPACE_DB_USER: ${DB_USER:-chainspace}
      CHAINSPACE_DB_PASSWORD: ${DB_PASSWORD}
      CHAINSPACE_DB_NAME: ${DB_NAME:-chainspace}
      CHAINSPACE_REDIS_HOST: redis
      CHAINSPACE_REDIS_PORT: 6379
      CHAINSPACE_REDIS_PASSWORD: ${REDIS_PASSWORD}
      CHAINSPACE_MINIO_ENDPOINT: minio:9000
      CHAINSPACE_MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      CHAINSPACE_MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      CHAINSPACE_MINIO_BUCKET: chainspace
      CHAINSPACE_MINIO_USE_SSL: "false"
      CHAINSPACE_MINIO_PUBLIC_URL: http://${PUBLIC_HOST}/storage
      CHAINSPACE_RABBITMQ_HOST: rabbitmq
      CHAINSPACE_RABBITMQ_PORT: 5672
      CHAINSPACE_RABBITMQ_USER: ${RABBITMQ_USER:-chainspace}
      CHAINSPACE_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      CHAINSPACE_JWT_SECRET: ${JWT_SECRET}
      CHAINSPACE_JWT_ACCESS_EXPIRE: 15m
      CHAINSPACE_JWT_REFRESH_EXPIRE: 168h
      CHAINSPACE_KUBERNETES_ENABLED: "false"
      CHAINSPACE_CORS_ALLOWED_ORIGINS: http://${PUBLIC_HOST}
      CHAINSPACE_LOG_OUTPUT: stdout
      CHAINSPACE_RATE_LIMIT_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    networks:
      - chainspace-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_WS_URL: /ws
    container_name: chainspace-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - chainspace-network

  nginx:
    image: nginx:alpine
    container_name: chainspace-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/public-ip.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - chainspace-network

networks:
  chainspace-network:
    driver: bridge
    name: chainspace-network

volumes:
  postgres_data:
    name: chainspace-postgres-data
  redis_data:
    name: chainspace-redis-data
  minio_data:
    name: chainspace-minio-data
  rabbitmq_data:
    name: chainspace-rabbitmq-data
  nginx_logs:
    name: chainspace-nginx-logs
